name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            widget/package-lock.json

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-api.txt supabase python-dotenv

      - name: Install widget dependencies
        run: npm ci
        working-directory: widget

      - name: Run API unit tests
        run: make test-unit

      - name: Run widget unit tests
        run: make test-widget

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            docmind-web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: docmind-web

      - name: Run frontend tests
        run: make test-frontend
